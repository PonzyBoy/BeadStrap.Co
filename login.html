<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - BeadStrapCo</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#e0c3fc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BOX LOGIN */
.login-box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2{
    color:#ff69b4;
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff69b4,#a855f7);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.03);
}

/* LINK */
a{
    display:block;
    margin-top:10px;
    color:#ff69b4;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login User 🔐</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Masuk</button>

    <a href="index.html">Kembali ke Home</a>
</div>

<script>
function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user && pass){
        // simpan user login
        localStorage.setItem("user", user);

        // ================= REDIRECT LOGIC =================
        let redirect = localStorage.getItem("redirectAfterLogin");

        if(redirect){
            localStorage.removeItem("redirectAfterLogin");
            window.location.href = redirect; // balik ke checkout
        } else {
            window.location.href = "index.html"; // default ke home
        }

    } else {
        alert("Isi username & password!");
    }
}
</script>
</body>
</html>
