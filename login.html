<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - BeadStrapCo</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#e0c3fc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    text-align:center;
}
.login-box h2{ color:#ff69b4; margin-bottom:20px; }
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing: border-box;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff69b4,#a855f7);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition: 0.2s;
    margin-top: 10px;
}
button:hover{ transform:scale(1.03); }
a{ display:block; margin-top:15px; color:#ff69b4; text-decoration:none; }
.info-hint { font-size: 11px; color: #aaa; margin-top: 15px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>

<div class="login-box">
    <h2>Login 🔐</h2>

    <input type="text" id="user" placeholder="Username" autocomplete="off">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Masuk</button>

    <a href="index.html">Kembali ke Home</a>
</div>

<script>
function login(){
    let usernameInput = document.getElementById("user").value.trim(); // .trim() menghapus spasi tidak sengaja
    let passwordInput = document.getElementById("pass").value.trim();

    // Cek di console log browser apa yang kamu ketik
    console.log("Username diketik:", usernameInput);
    console.log("Password diketik:", passwordInput);

    if(!usernameInput || !passwordInput){
        alert("Isi username & password!");
        return;
    }

    // ================= JALUR LOGIN ADMIN =================
    if (usernameInput === "admin" && passwordInput === "admin123") {
        
        // Atur akses admin ke true
        localStorage.setItem("admin", "true"); 
        
        // Intip status apakah sukses masuk ke storage sebelum pindah halaman
        console.log("Status Admin di LocalStorage:", localStorage.getItem("admin"));
        
        alert("Login Admin Berhasil! Menuju ke halaman admin...");
        window.location.href = "admin.html"; 
    } 
    
    // ================= JALUR LOGIN USER BIASA =================
    else {
        localStorage.setItem("user", usernameInput);
        alert("Login User Berhasil!");

        let redirect = localStorage.getItem("redirectAfterLogin");
        if(redirect){
            localStorage.removeItem("redirectAfterLogin");
            window.location.href = redirect;
        } else {
            window.location.href = "index.html";
        }
    }
}
</script>
</body>
</html>
