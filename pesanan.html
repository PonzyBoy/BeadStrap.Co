<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pesanan Saya - BeadStrapCo</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#e0c3fc);
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h2{
    text-align:center;
    color:#ff69b4;
}

.order{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.invoice{
    font-weight:bold;
    color:#a855f7;
}

.status{
    display:inline-block;
    background:#fff0f7;
    color:#ff1493;
    padding:5px 10px;
    border-radius:20px;
    margin-top:10px;
}

.item{
    margin-left:15px;
    margin-top:5px;
}

.total{
    margin-top:10px;
    font-weight:bold;
    color:#ff69b4;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    border-radius:25px;
    text-decoration:none;
    background:linear-gradient(45deg,#ff69b4,#a855f7);
    color:white;
}
</style>
</head>

<body>

<div class="container">

    <h2>📦 Pesanan Saya</h2>

    <div id="listPesanan"></div>

    <center>
        <a href="produk.html" class="btn">
            Belanja Lagi 🛍️
        </a>
    </center>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let list = document.getElementById("listPesanan");

if(orders.length === 0){

    list.innerHTML = `
        <div class="order">
            <h3>Belum ada pesanan 😢</h3>
        </div>
    `;

}else{

    orders.reverse().forEach(order=>{

        let itemsHTML = "";

        if(order.items){

            order.items.forEach(item=>{

                itemsHTML += `
                    <div class="item">
                        • ${item.nama} (${item.jumlah}x)
                    </div>
                `;
            });

        }

        list.innerHTML += `
        <div class="order">

            <div class="invoice">
                ${order.invoice}
            </div>

            <p>
                <b>Nama:</b> ${order.nama}<br>
                <b>No HP:</b> ${order.nohp}<br>
                <b>Alamat:</b> ${order.alamat}<br>
                <b>Tanggal:</b> ${order.tanggal}
            </p>

            <h4>Produk:</h4>

            ${itemsHTML}

            <div class="total">
                Total: Rp ${order.total}
            </div>

            <div class="status">
                ${order.status}
            </div>

        </div>
        `;
    });

}

</script>

<script>
window.addEventListener("load", function(){
    const loader = document.getElementById("loader");

    setTimeout(() => {
        loader.classList.add("hide");
    }, 1200);
});
</script>

</body>
</html>
