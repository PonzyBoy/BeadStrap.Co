<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kontak - BeadStrapCo</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Sedikit tambahan style pembantu agar link tabel terlihat cantik */
body {
    font-family: 'Poppins', sans-serif;
}
.kontak-table a {
    color: #ff69b4;
    text-decoration: none;
    font-weight: 600;
}
.kontak-table a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div id="loader">
    <div class="loader-box">
        <div class="spinner"></div>
        <h2>Memuat Kontak BeadStrap.Co 💖</h2>
    </div>
</div>

<div class="parallax"></div>

<header class="navbar">
    <div class="logo">
        <img src="logo.jpg">
        <h2>BeadStrap.Co</h2>
    </div>

    <nav id="nav">
        <a href="index.html">Home</a>
        <a href="produk.html">Produk</a>
        <a href="kontak.html">Kontak</a>
        <a href="login.html">Login 👤</a>

        <a href="keranjang.html" class="cart">
            🛒 <span id="count" class="badge">0</span>
        </a>
    </nav>
</header>

<section class="kontak">
    <div class="box kontak-box fade-up">

        <h2>Hubungi Kami 📞</h2>

        <table class="kontak-table">
            <tr>
                <td>WhatsApp</td>
                <td>: <a href="https://wa.me/6283143168775" target="_blank">0831-4316-8775</a></td>
            </tr>
            <tr>
                <td>Instagram</td>
                <td>: <a href="https://instagram.com/beadstrapco" target="_blank">@beadstrapco</a></td>
            </tr>
            <tr>
                <td>Email</td>
                <td>: <a href="mailto:beadstrap@gmail.com">beadstrap@gmail.com</a></td>
            </tr>
            <tr>
                <td>Alamat</td>
                <td>: Nusa Tenggara Barat, Mataram</td>
            </tr>
        </table>

        <form class="form" id="form-kontak" onsubmit="kirimPesanKontak(event)">
            <input type="text" id="kontak-nama" placeholder="Nama" required>
            <input type="email" id="kontak-email" placeholder="Email" required>
            <textarea id="kontak-pesan" placeholder="Pesan" required></textarea>
            <button type="submit" class="btn">Kirim Pesan 🚀</button>
        </form>

    </div>
</section>

<div class="wave"></div>

<script>
const icons = ["💖","✨","🌸","💎"];
for(let i=0;i<12;i++){
    let el = document.createElement("div");
    el.className = "float-icon";
    el.innerText = icons[Math.floor(Math.random()*icons.length)];
    el.style.left = Math.random()*100 + "%";
    el.style.bottom = "0px";
    el.style.animationDelay = Math.random()*5 + "s";
    document.body.appendChild(el);
}
</script>

<script>
function kirimPesanKontak(event) {
    // Mencegah halaman reload saat form di-submit
    event.preventDefault(); 

    // Mengambil data inputan pengguna
    const nama = document.getElementById("kontak-nama").value.trim();
    const email = document.getElementById("kontak-email").value.trim();
    const pesan = document.getElementById("kontak-pesan").value.trim();

    if(!nama || !email || !pesan) {
        alert("Mohon lengkapi semua kolom form terlebih dahulu!");
        return;
    }

    // OPSI 1: Diarahkan langsung ke WhatsApp Admin (Paling Direkomendasikan untuk web statis)
    const nomorWA = "6283143168775"; // Format kode negara tanpa tanda '+'
    const teksPesan = `Halo BeadStrapCo! ✨\n\n` +
                      `Nama: ${nama}\n` +
                      `Email: ${email}\n` +
                      `Pesan: ${pesan}`;
                      
    const urlWhatsApp = `https://wa.me/${nomorWA}?text=${encodeURIComponent(teksPesan)}`;
    
    // Buka tautan WhatsApp di tab baru
    window.open(urlWhatsApp, '_blank');

    // Reset formulir setelah pengiriman berhasil
    document.getElementById("form-kontak").reset();
    alert(`Terima kasih ${nama}! Pesanan/pesan Anda diteruskan ke WhatsApp Admin. 💕`);
}
</script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(i => total += i.jumlah);
document.getElementById("count").innerText = total;
</script>

<script>
window.addEventListener("load", function(){
    const loader = document.getElementById("loader");
    setTimeout(() => {
        // Menggunakan display none bawaan agar sinkron jika class 'hide' belum ter-style di CSS Anda
        loader.style.display = "none"; 
    }, 1200);
});
</script>

<script>
// ================= ACTIVE PAGE AUTO =================
// Perbaikan selektor dari ".menu a" menjadi "nav a" agar sesuai dengan struktur HTML navbar Anda
const links = document.querySelectorAll("nav a");
const currentPage = window.location.pathname.split("/").pop() || "index.html";

links.forEach(link => {
    if(link.getAttribute("href") === currentPage){
        link.classList.add("active");
    }
});
</script>

</body>
</html>
